<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryToVideo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root{--bg:#0c0b09;--bg2:#1a1816;--fg:#f5f0e8;--muted:#7a7268;--accent:#e8913a;--card:#151311;--border:#2a2622;--red:#ef4444;--green:#22c55e;--purple:#a855f7}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;align-items:center;justify-content:center}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(232,145,58,.06) 0%,transparent 55%);pointer-events:none}
        .app{position:relative;z-index:1;width:100%;max-width:680px;padding:1.5rem}

        .canvas-box{position:relative;background:#000;border-radius:12px;overflow:hidden;aspect-ratio:16/9;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px var(--border);margin-bottom:1rem}
        .canvas-box canvas{width:100%;height:100%;display:block}
        .bar-top,.bar-bot{position:absolute;left:0;right:0;height:7%;background:#000;pointer-events:none;z-index:2}
        .bar-top{top:0}.bar-bot{bottom:0}

        .idle-ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3;transition:opacity .4s}

        .controls{display:flex;gap:.6rem;align-items:center;margin-bottom:.8rem;flex-wrap:wrap}
        .btn{font-family:inherit;font-size:.88rem;font-weight:600;padding:.65rem 1.4rem;border-radius:10px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:.45rem;transition:all .25s}
        .btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important}
        .btn-go{background:var(--accent);color:#0c0b09}
        .btn-go:hover:not(:disabled){background:#f0a050;transform:translateY(-1px);box-shadow:0 8px 24px rgba(232,145,58,.3)}
        .btn-stop{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
        .btn-stop:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(239,68,68,.3)}
        .btn-signin{background:linear-gradient(135deg,#ea4335,#c5221f);color:#fff;margin:0 auto}
        .btn-signin:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(234,67,53,.3)}

        .status-bar{display:flex;align-items:center;gap:.6rem;margin-bottom:.6rem;flex-wrap:wrap}
        .badge{display:inline-flex;align-items:center;gap:.35rem;padding:.2rem .6rem;border-radius:16px;font-size:.72rem;font-weight:600}
        .b-idle{background:var(--bg2);color:var(--muted)}
        .b-run{background:rgba(232,145,58,.14);color:var(--accent)}
        .b-done{background:rgba(34,197,94,.14);color:var(--green)}
        .b-err{background:rgba(239,68,68,.14);color:var(--red)}
        .stat{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:.25rem}
        .stat b{color:var(--fg);font-size:.85rem}
        .genre-tag{margin-left:auto;font-size:.78rem;font-weight:600;color:var(--accent)}

        .steps{display:flex;gap:.35rem;margin-bottom:.6rem}
        .step{flex:1;padding:.3rem .15rem;border-radius:6px;text-align:center;font-size:.58rem;font-weight:600;color:var(--muted);background:var(--bg2);border:1px solid var(--border);transition:all .3s;text-transform:uppercase;letter-spacing:.3px}
        .step i{display:block;font-size:.65rem;margin-bottom:.1rem}
        .step.active{color:var(--accent);border-color:var(--accent);background:rgba(232,145,58,.08)}
        .step.done{color:var(--green);border-color:var(--green);background:rgba(34,197,94,.08)}
        .step.err{color:var(--red);border-color:var(--red);background:rgba(239,68,68,.08)}

        .log{max-height:120px;overflow-y:auto;display:none;flex-direction:column;gap:.15rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
        .log.show{display:flex}
        .log-item{font-size:.68rem;padding:.2rem .45rem;border-radius:4px;background:var(--bg2);display:flex;gap:.35rem;line-height:1.3}
        .log-item.ok{border-left:2px solid var(--green)}
        .log-item.err{border-left:2px solid var(--red)}
        .log-item.warn{border-left:2px solid #f59e0b}
        .log-item.info{border-left:2px solid var(--muted)}
        .log-time{color:var(--muted);font-size:.58rem;flex-shrink:0;min-width:38px}

        .note{text-align:center;margin-top:.8rem;font-size:.7rem;color:var(--muted);line-height:1.5}
        .note a{color:var(--accent);text-decoration:none}
        .note a:hover{text-decoration:underline}

        .toast-el{position:fixed;bottom:1.2rem;right:1.2rem;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;font-size:.82rem;box-shadow:0 10px 36px rgba(0,0,0,.45);transform:translateY(130%);transition:transform .4s cubic-bezier(.16,1,.3,1);z-index:200;display:flex;align-items:center;gap:.5rem;max-width:340px}
        .toast-el.vis{transform:translateY(0)}

        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.pulse{animation:pulse 1.2s ease-in-out infinite}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
        @media(max-width:480px){.app{padding:1rem}.steps{flex-wrap:wrap}.step{min-width:calc(50% - .2rem)}}
    </style>
</head>
<body>
<div class="app">
    <div class="canvas-box">
        <div class="bar-top"></div><div class="bar-bot"></div>
        <canvas id="cv" width="1280" height="720"></canvas>
        <div class="idle-ov" id="idleOv">
            <i class="fas fa-clapperboard" style="font-size:2rem;color:var(--muted);opacity:.2;margin-bottom:.5rem"></i>
            <p style="color:var(--muted);opacity:.4;font-size:.78rem" id="idleText">Sign in to start</p>
        </div>
    </div>

    <!-- Sign in (shown first) -->
    <div id="signinArea" style="text-align:center;margin-bottom:.8rem">
        <button id="signinBtn" class="btn btn-signin" disabled><i class="fab fa-google"></i> Sign in with Google</button>
        <p style="font-size:.68rem;color:var(--muted);margin-top:.4rem" id="signinHint">Loading...</p>
    </div>

    <!-- Controls (hidden until signed in) -->
    <div id="controlArea" style="display:none">
        <div class="controls">
            <button id="startBtn" class="btn btn-go" disabled><i class="fas fa-bolt"></i> Start</button>
            <button id="stopBtn" class="btn btn-stop" disabled><i class="fas fa-stop"></i> Stop</button>
        </div>
        <div class="status-bar">
            <div id="badge" class="badge b-idle"><i class="fas fa-circle" style="font-size:.25rem"></i> Idle</div>
            <div class="stat"><i class="fas fa-film" style="color:var(--accent)"></i> <b id="sGen">0</b></div>
            <div class="stat"><i class="fab fa-youtube" style="color:var(--red)"></i> <b id="sUp">0</b></div>
            <div class="stat"><i class="fas fa-xmark" style="color:#f59e0b"></i> <b id="sFail">0</b></div>
            <span class="genre-tag" id="genreTag">—</span>
        </div>
        <div class="steps">
            <div class="step" data-s="story"><i class="fas fa-pen-fancy"></i>Story</div>
            <div class="step" data-s="images"><i class="fas fa-images"></i>Images</div>
            <div class="step" data-s="record"><i class="fas fa-circle-dot"></i>Record</div>
            <div class="step" data-s="upload"><i class="fab fa-youtube"></i>Upload</div>
        </div>
        <div id="logEl" class="log"></div>
    </div>

    <p class="note" id="noteText">Serve via <code>python -m http.server 8000</code> then add origin to <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener">Google Cloud Console</a> credentials.</p>
</div>

<div id="toast" class="toast-el"><i id="tIco" class="fas fa-check-circle" style="color:var(--green)"></i><span id="tMsg">OK</span></div>

<script>
const SLIDE_MS=2000,TRANS_MS=450,CW=1280,CH=720,WPS=5;
const API_KEY='AQ.Ab8RN6KR925XE2TZrE8_q8zy8vvpoztdnC_82Yw92TTyDXl97Q';
const GENRES=['Action','Adventure','Comedy','Crime','Drama','Fantasy','Science Fiction','Horror','Mystery','Thriller','Romance','Historical Fiction','Dark Fantasy','Epic Fantasy','Dystopian','Cyberpunk','Space Opera','Time Travel','Coming of Age','Survival','Detective','Noir','Heist','Gothic Fiction','Magical Realism','Fairy Tale','Mythology','Psychological Thriller','Western','War','Satire','Literary Fiction','Flash Fiction','Slice of Life','Suspense','Paranormal','Urban Fantasy','Steampunk','Post-Apocalyptic','Cosmic Horror','Folk Horror','Monster Fiction','Pirate Adventure','Sports Fiction','Philosophical Fiction'];

let segs=[],imgs=[],playing=false,animId=null,t0=0;
let utter=null,ttsEnded=false,recorder=null,recChunks=[],videoBlob=null;
let accessToken=null,tokenClient=null,autoRunning=false,currentGenre='';
let stats={gen:0,up:0,fail:0,cfail:0};

const $=id=>document.getElementById(id);
const cv=$('cv'),ctx=cv.getContext('2d');

/* --- Voice helpers (minimal) --- */
function getVoice(){const v=speechSynthesis.getVoices();return v.find(x=>x.lang.startsWith('en')&&x.name.toLowerCase().includes('google'))||v.find(x=>x.lang.startsWith('en'))||v[0]||null;}
function getLang(){const v=getVoice();return v?v.lang:'en-US';}

/* --- Text split --- */
function splitText(text){
    const out=[],sents=text.match(/[^.!?]+[.!?]+/g)||[text];
    for(const s of sents){const w=s.trim().split(/\s+/).filter(Boolean);
    if(w.length<=WPS){if(w.length)out.push(w.join(' '));continue;}
    const parts=s.split(/[,;،]/);let buf='';
    for(const p of parts){const pw=p.trim().split(/\s+/).filter(Boolean).length,bw=buf?buf.split(/\s+/).filter(Boolean).length:0;
    if(bw+pw>WPS&&buf){out.push(buf.trim());buf=p;}else{buf+=(buf?' ':'')+p;}
    if(buf.split(/\s+/).filter(Boolean).length>=WPS){out.push(buf.trim());buf='';}}
    if(buf){const rw=buf.trim().split(/\s+/).filter(Boolean);for(let i=0;i<rw.length;i+=WPS)out.push(rw.slice(i,i+WPS).join(' '));}}
    return out.filter(s=>s.trim().length>0);
}

/* --- Image loading --- */
function loadImg(url){return new Promise((res,rej)=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>res(img);img.onerror=()=>{const i2=new Image();i2.crossOrigin='anonymous';i2.onload=()=>res(i2);i2.onerror=rej;i2.src=url.replace(/seed\/[^/]+/,`seed/r${Math.random().toString(36).slice(2,8)}`);};img.src=url;});}

/* --- Ken Burns --- */
const KB=[{sS:1,eS:1.16,sX:0,sY:0,eX:-.04,eY:-.04},{sS:1.12,eS:1,sX:-.04,sY:0,eX:0,eY:0},{sS:1,eS:1.14,sX:0,sY:-.03,eX:-.03,eY:.01},{sS:1.1,eS:1,sX:.03,sY:0,eX:-.01,eY:-.03},{sS:1,eS:1.18,sX:-.02,sY:-.02,eX:.01,eY:.01},{sS:1.06,eS:1.14,sX:.02,sY:-.01,eX:-.02,eY:.02}];
function drawCover(img,sc,ox,oy,a){const ir=img.width/img.height,cr=CW/CH;let dw,dh;if(ir>cr){dh=CH*sc;dw=dh*ir;}else{dw=CW*sc;dh=dw/ir;}ctx.save();ctx.globalAlpha=a;ctx.drawImage(img,(CW-dw)/2+ox*CW,(CH-dh)/2+oy*CH,dw,dh);ctx.restore();}

function drawFrame(idx,prog){
    if(idx>=imgs.length)return;const img=imgs[idx],kb=KB[idx%KB.length];
    const t=prog<.5?2*prog*prog:1-Math.pow(-2*prog+2,2)/2;
    const sc=kb.sS+(kb.eS-kb.sS)*t,ox=kb.sX+(kb.eX-kb.sX)*t,oy=kb.sY+(kb.eY-kb.sY)*t;
    ctx.fillStyle='#000';ctx.fillRect(0,0,CW,CH);
    if(idx>0&&prog<TRANS_MS/SLIDE_MS){const fp=prog/(TRANS_MS/SLIDE_MS),pk=KB[(idx-1)%KB.length];drawCover(imgs[idx-1],pk.eS,pk.eX,pk.eY,1-fp);drawCover(img,sc,ox,oy,fp);}else{drawCover(img,sc,ox,oy,1);}
    ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(0,0,CW,CH);
    const vig=ctx.createRadialGradient(CW/2,CH/2,CW*.28,CW/2,CH/2,CW*.78);vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.55)');ctx.fillStyle=vig;ctx.fillRect(0,0,CW,CH);
    if(segs[idx]){const txt=segs[idx],alpha=Math.min(prog*5,(1-prog)*5,1);ctx.save();ctx.globalAlpha=Math.max(0,alpha);ctx.font='600 28px "Space Grotesk",sans-serif';let disp=txt;while(ctx.measureText(disp).width>CW-152&&disp.length>8)disp=disp.slice(0,-1);if(disp!==txt)disp+='...';const tw=ctx.measureText(disp).width,pad=36,bw=Math.min(tw+pad*2,CW-80),bh=54,bx=(CW-bw)/2,by=CH*.82,r=12;ctx.beginPath();ctx.moveTo(bx+r,by);ctx.lineTo(bx+bw-r,by);ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+r);ctx.lineTo(bx+bw,by+bh-r);ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-r,by+bh);ctx.lineTo(bx+r,by+bh);ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-r);ctx.lineTo(bx,by+r);ctx.quadraticCurveTo(bx,by,bx+r,by);ctx.closePath();ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fill();ctx.beginPath();ctx.moveTo(bx+r,by);ctx.lineTo(bx+bw-r,by);ctx.strokeStyle='rgba(232,145,58,0.85)';ctx.lineWidth=2.5;ctx.stroke();ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=10;ctx.shadowOffsetY=2;ctx.fillText(disp,CW/2,by+bh/2);ctx.restore();}
    ctx.font='500 14px "Space Grotesk",sans-serif';ctx.fillStyle='rgba(255,255,255,0.35)';ctx.textAlign='right';ctx.textBaseline='top';ctx.fillText(`${idx+1}/${segs.length}`,CW-28,CH*.1+4);
    if(playing&&!ttsEnded){const now=performance.now(),dx=28,dy=CH*.1+6;for(let i=0;i<4;i++){const h=6+Math.sin(now*.008+i*1.2)*7;ctx.fillStyle=`rgba(168,85,247,${(.5+Math.sin(now*.006+i)*.3).toFixed(2)})`;ctx.fillRect(dx+i*6,dy+12-h/2,3,h);}ctx.font='500 12px "Space Grotesk",sans-serif';ctx.fillStyle='rgba(168,85,247,0.6)';ctx.textAlign='left';ctx.fillText('NARRATING',dx+30,dy+4);}
    const tp=(idx+prog)/segs.length;ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(0,CH*.925,CW,3);ctx.fillStyle='#e8913a';ctx.fillRect(0,CH*.925,CW*tp,3);
}
function animate(ts){if(!playing)return;if(!t0)t0=ts;const el=ts-t0;drawFrame(Math.min(Math.floor(el/SLIDE_MS),segs.length-1),(el%SLIDE_MS)/SLIDE_MS);animId=requestAnimationFrame(animate);}

/* --- UI helpers --- */
function fmtB(b){return b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';}
function setBadge(t,txt){const el=$('badge');el.className=`badge b-${t}`;const ic={idle:'fa-circle',run:'fa-bolt',done:'fa-check',err:'fa-xmark'};el.innerHTML=`<i class="fas ${ic[t]||'fa-circle'}" style="font-size:${t==='idle'?'.25rem':'.6rem'};${t==='run'?'animation:pulse 1.2s ease-in-out infinite':''}"></i> ${txt}`;}
function setStep(n,s){document.querySelectorAll('.step').forEach(e=>{e.classList.remove('active','done','err');if(e.dataset.s===n)e.classList.add(s);});}
function upStats(){$('sGen').textContent=stats.gen;$('sUp').textContent=stats.up;$('sFail').textContent=stats.fail;}
function addLog(m,t='info'){$('logEl').classList.add('show');const d=document.createElement('div');d.className='log-item '+t;const n=new Date();d.innerHTML=`<span class="log-time">${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}</span><span>${m}</span>`;$('logEl').prepend(d);while($('logEl').children.length>30)$('logEl').lastChild.remove();}
let toastT;function toast(m,ic='fa-check-circle',c='var(--green)'){$('tIco').className=`fas ${ic}`;$('tIco').style.color=c;$('tMsg').textContent=m;$('toast').classList.add('vis');clearTimeout(toastT);toastT=setTimeout(()=>$('toast').classList.remove('vis'),3500);}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

/* --- Gemini story --- */
async function genStory(genre){
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:`Write a short story in the ${genre} genre. Around 400 words. Highly visual and descriptive, perfect for narration over images. Avoid excessive dialogue. Focus on vivid descriptions, action, atmosphere, sensory details. Complete sentences with proper punctuation. Satisfying conclusion.`}]}],generationConfig:{temperature:1.3,maxOutputTokens:1024}})
    });
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`API ${r.status}`);}
    const d=await r.json();const t=d.candidates?.[0]?.content?.parts?.[0]?.text;if(!t)throw new Error('Empty response');return t.trim();
}

/* --- Video generation (promise) --- */
function genVideo(text){
    return new Promise(async(resolve,reject)=>{
        segs=[];imgs=[];videoBlob=null;recChunks=[];
        segs=splitText(text);if(!segs.length){reject(new Error('Cannot split text'));return;}
        for(let i=0;i<segs.length;i++){
            const seed=`s${Date.now()}${i}${Math.random().toString(36).slice(2,6)}`;
            try{imgs.push(await loadImg(`https://picsum.photos/seed/${seed}/1280/720.jpg`));}
            catch{const c=document.createElement('canvas');c.width=1280;c.height=720;const cx=c.getContext('2d');cx.fillStyle=`hsl(${(i*37)%360},30%,18%)`;cx.fillRect(0,0,1280,720);cx.font='600 48px "Space Grotesk",sans-serif';cx.fillStyle=`hsl(${(i*37)%360},40%,50%)`;cx.textAlign='center';cx.textBaseline='middle';cx.fillText(`Scene ${i+1}`,640,360);const im=new Image();im.src=c.toDataURL();await new Promise(r=>{im.onload=r;});imgs.push(im);}
        }
        try{
            const stream=cv.captureStream(30);let mime='';
            for(const c of ['video/webm;codecs=vp8','video/webm;codecs=vp8,opus','video/webm']){if(MediaRecorder.isTypeSupported(c)){mime=c;break;}}
            if(!mime)mime='video/webm';
            recorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:4000000});
            recorder.ondataavailable=e=>{if(e.data&&e.data.size>0)recChunks.push(e.data);};
            recorder.onstop=()=>{videoBlob=new Blob(recChunks,{type:'video/webm'});resolve(videoBlob);};
            recorder.onerror=()=>reject(new Error('Recorder failed'));recorder.start(200);
        }catch(e){reject(e);return;}

        utter=new SpeechSynthesisUtterance(text);utter.rate=1;utter.pitch=1;utter.lang=getLang();
        const sv=getVoice();if(sv){utter.voice=sv;utter.lang=sv.lang;}
        ttsEnded=false;playing=true;t0=0;
        utter.onend=()=>{ttsEnded=true;if(playing){const w=SLIDE_MS-(performance.now()-t0)%SLIDE_MS+300;setTimeout(()=>{if(playing){playing=false;if(animId)cancelAnimationFrame(animId);if(recorder&&recorder.state==='recording')recorder.stop();}},w);}};
        utter.onerror=()=>{if(playing){playing=false;if(animId)cancelAnimationFrame(animId);if(recorder&&recorder.state==='recording')recorder.stop();}reject(new Error('TTS failed'));};
        await sleep(100);speechSynthesis.speak(utter);animId=requestAnimationFrame(animate);
    });
}

/* --- YouTube upload (promise) --- */
function uploadVid(title){
    return new Promise((resolve,reject)=>{
        if(!accessToken||!videoBlob){reject(new Error('Not signed in'));return;}
        const metadata={snippet:{title:`Short Story - ${title}`.slice(0,100),description:`Generated by StoryToVideo | Genre: ${currentGenre}`,categoryId:'22'},status:{privacyStatus:'private',selfDeclaredMadeForKids:false}};
        const boundary='-------314159265358979323846';
        const reader=new FileReader();
        reader.onerror=()=>reject(new Error('File read failed'));
        reader.onload=function(){
            const enc=new TextEncoder();
            const pre=enc.encode('--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(metadata)+'\r\n--'+boundary+'\r\nContent-Type: '+videoBlob.type+'\r\n\r\n');
            const post=enc.encode('\r\n--'+boundary+'--\r\n');
            const fileBytes=new Uint8Array(reader.result);
            const body=new Uint8Array(pre.length+fileBytes.length+post.length);
            body.set(pre,0);body.set(fileBytes,pre.length);body.set(post,pre.length+fileBytes.length);
            const xhr=new XMLHttpRequest();
            xhr.open('POST','https://www.googleapis.com/upload/youtube/v3/videos?uploadType=multipart&part=snippet,status');
            xhr.setRequestHeader('Authorization','Bearer '+accessToken);
            xhr.setRequestHeader('Content-Type','multipart/related; boundary='+boundary);
            xhr.onload=()=>{if(xhr.status>=200&&xhr.status<300){let d;try{d=JSON.parse(xhr.responseText);}catch{d={};}resolve(d.id||'ok');}else{let msg=`Upload failed (${xhr.status})`;try{const e=JSON.parse(xhr.responseText);if(xhr.status===401){lockUI();msg='Session expired';}else if(e.error?.message)msg=e.error.message;}catch{}reject(new Error(msg));}};
            xhr.onerror=()=>reject(new Error('Network error'));xhr.send(body.buffer);
        };
        reader.readAsArrayBuffer(videoBlob);
    });
}

/* --- Auth --- */
function unlockUI(){
    $('signinArea').style.display='none';$('controlArea').style.display='block';$('startBtn').disabled=false;
    $('idleOv').innerHTML='<i class="fas fa-bolt" style="font-size:2rem;color:var(--accent);opacity:.3;margin-bottom:.5rem"></i><p style="color:var(--muted);opacity:.5;font-size:.78rem">Ready</p>';
    $('noteText').style.display='none';
}
function lockUI(){
    $('signinArea').style.display='block';$('controlArea').style.display='none';
    $('signinBtn').disabled=false;$('signinBtn').innerHTML='<i class="fab fa-google"></i> Reconnect';
    $('signinHint').textContent='Session expired — sign in again';
    $('idleOv').innerHTML='<i class="fas fa-clapperboard" style="font-size:2rem;color:var(--muted);opacity:.2;margin-bottom:.5rem"></i><p style="color:var(--muted);opacity:.4;font-size:.78rem">Sign in again</p>';
    if(autoRunning){autoRunning=false;playing=false;if(animId)cancelAnimationFrame(animId);if(utter)speechSynthesis.cancel();if(recorder&&recorder.state==='recording')recorder.stop();setBadge('err','Expired');addLog('Session expired','err');toast('Session expired','fa-xmark','var(--red)');}
}
function initYT(){
    try{if(typeof google==='undefined'||!google.accounts||!google.accounts.oauth2)return;
    tokenClient=google.accounts.oauth2.initTokenClient({
        client_id:'699259843998-qg5t2emtfubf2gpj7hbfrdgbi3lqocl5.apps.googleusercontent.com',
        scope:'https://www.googleapis.com/auth/youtube.upload',
        callback:r=>{if(r.access_token){accessToken=r.access_token;unlockUI();if(autoRunning&&!playing)autoLoop();}else if(r.error!=='popup_closed')toast('Sign-in failed','fa-xmark','var(--red)');}
    });$('signinBtn').disabled=false;$('signinHint').textContent='Click to connect your YouTube account';}catch(e){$('signinHint').textContent='Google SDK failed to load';}
}
 $('signinBtn').addEventListener('click',()=>{if(tokenClient)tokenClient.requestAccessToken();});
window.addEventListener('load',()=>{setTimeout(initYT,600);});

/* --- Auto loop --- */
function pickGenre(){return GENRES[Math.floor(Math.random()*GENRES.length)];}

async function autoLoop(){
    while(autoRunning){
        currentGenre=pickGenre();$('genreTag').textContent=currentGenre;
        setStep('story','active');setStep('images','');setStep('record','');setStep('upload','');
        setBadge('run',`Generating...`);addLog(`Starting: ${currentGenre}`,'info');
        let story='';
        try{story=await genStory(currentGenre);addLog(`${currentGenre}: Story ready (${story.split(/\s+/).length} words)`,'ok');setStep('story','done');}
        catch(e){stats.fail++;stats.cfail++;upStats();setStep('story','err');addLog(`${currentGenre}: ${e.message}`,'err');if(stats.cfail>=5){addLog('5 fails, waiting 15s...','warn');await sleep(15000);stats.cfail=0;}else await sleep(3000);if(!autoRunning)break;continue;}
        if(!autoRunning)break;stats.cfail=0;
        setStep('images','active');setStep('record','active');setBadge('run','Recording...');$('idleOv').style.opacity='0';
        try{await genVideo(story);stats.gen++;upStats();addLog(`${currentGenre}: Video done (${fmtB(videoBlob.size)})`,'ok');setStep('images','done');setStep('record','done');}
        catch(e){stats.fail++;stats.cfail++;upStats();setStep('record','err');addLog(`${currentGenre}: ${e.message}`,'err');playing=false;if(animId)cancelAnimationFrame(animId);if(utter)speechSynthesis.cancel();if(recorder&&recorder.state==='recording')recorder.stop();if(stats.cfail>=5){addLog('5 fails, waiting 15s...','warn');await sleep(15000);stats.cfail=0;}else await sleep(3000);if(!autoRunning)break;continue;}
        if(!autoRunning)break;
        setStep('upload','active');setBadge('run','Uploading...');
        try{const vid=await uploadVid(currentGenre);stats.up++;upStats();addLog(`Uploaded: youtube.com/watch?v=${vid}`,'ok');setStep('upload','done');toast(`Uploaded: ${currentGenre}`);}
        catch(e){addLog(`Upload: ${e.message}`,'err');setStep('upload','err');if(e.message.includes('expired')||e.message.includes('401')){lockUI();break;}}
        setBadge('done','Done');await sleep(1500);
    }
}

/* --- Controls --- */
 $('startBtn').addEventListener('click',()=>{autoRunning=true;stats.cfail=0;$('startBtn').disabled=true;$('stopBtn').disabled=false;$('logEl').innerHTML='';upStats();addLog('Started','ok');toast('Auto loop started','fa-bolt','var(--accent)');autoLoop();});
 $('stopBtn').addEventListener('click',()=>{autoRunning=false;playing=false;if(animId)cancelAnimationFrame(animId);if(utter)speechSynthesis.cancel();if(recorder&&recorder.state==='recording')recorder.stop();$('startBtn').disabled=false;$('stopBtn').disabled=true;setBadge('idle','Stopped');setStep('story','');setStep('images','');setStep('record','');setStep('upload','');$('genreTag').textContent='—';$('idleOv').innerHTML='<i class="fas fa-bolt" style="font-size:2rem;color:var(--accent);opacity:.3;margin-bottom:.5rem"></i><p style="color:var(--muted);opacity:.5;font-size:.78rem">Paused</p>';$('idleOv').style.opacity='1';addLog('Stopped','warn');toast('Stopped','fa-stop','#f59e0b');});

/* Idle canvas */
ctx.fillStyle='#080706';ctx.fillRect(0,0,CW,CH);
const ig=ctx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,CW*.45);ig.addColorStop(0,'rgba(232,145,58,0.035)');ig.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=ig;ctx.fillRect(0,0,CW,CH);
</script>
